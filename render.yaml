# ============================================
# Render Infrastructure as Code
# ============================================
# This file tells Render how to build and deploy
# both the frontend and backend services.
# Docs: https://render.com/docs/blueprint-spec
# ============================================

services:
  # ---- Frontend (Next.js) ----
  - type: web
    name: ai-analytics-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false  # Set manually in Render dashboard
      - key: PORT
        value: 3000

  # ---- Backend (FastAPI) — Phase 6 ----
